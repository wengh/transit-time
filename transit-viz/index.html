<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transit Isochrone</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; }
    #city-select {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000;
      background: #f5f5f5;
      display: flex; align-items: center; justify-content: center;
    }
    #city-select-inner {
      background: white; padding: 40px; border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12); max-width: 520px; width: 90%;
      text-align: center;
    }
    #city-select-inner h1 { font-size: 24px; margin-bottom: 8px; }
    #city-select-inner p { color: #666; margin-bottom: 24px; font-size: 14px; }
    .city-list { list-style: none; padding: 0; }
    .city-list li { margin-bottom: 10px; }
    .city-btn {
      display: block; width: 100%; padding: 14px 20px;
      background: white; border: 1px solid #ddd; border-radius: 8px;
      font-size: 15px; cursor: pointer; text-align: left;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .city-btn:hover {
      border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
    }
    .city-btn .city-name { font-weight: 600; }
    .city-btn .city-detail { font-size: 12px; color: #888; margin-top: 2px; }
    #loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1500;
      background: rgba(255,255,255,0.9);
      display: none; align-items: center; justify-content: center;
      font-size: 16px; color: #555;
    }
    #controls {
      position: absolute; top: 10px; right: 10px; z-index: 1000;
      background: white; padding: 16px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); min-width: 280px;
      max-height: calc(100vh - 20px); overflow-y: auto;
      display: none;
    }
    #controls h3 { margin-bottom: 12px; }
    .control-group { margin-bottom: 12px; }
    .control-group label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
    .control-group select, .control-group input { width: 100%; padding: 6px; }
    #status { font-size: 12px; color: #888; margin-top: 8px; }
    #pattern-info { font-size: 11px; color: #aaa; margin-top: 4px; }
    #change-city {
      display: inline-block; margin-top: 10px; padding: 4px 10px;
      background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px;
      font-size: 12px; cursor: pointer; color: #555;
    }
    #change-city:hover { background: #e0e0e0; }
    #legend {
      position: absolute; bottom: 20px; left: 10px; z-index: 1000;
      background: white; padding: 12px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: none;
    }
    #legend-gradient {
      width: 200px; height: 20px; border-radius: 4px;
    }
    #legend-labels { display: flex; justify-content: space-between; font-size: 11px; margin-top: 4px; }
    #hover-info {
      position: absolute; bottom: 20px; right: 10px; z-index: 1000;
      background: white; padding: 12px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: none;
      min-width: 220px; max-width: 320px; max-height: 50vh; overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="city-select">
    <div id="city-select-inner">
      <h1>Transit Isochrone</h1>
      <p>Select a city to visualize transit travel times</p>
      <ul class="city-list" id="city-list"></ul>
    </div>
  </div>

  <div id="loading-overlay">
    <div id="loading-text">Loading transit data...</div>
  </div>

  <div id="map"></div>

  <div id="controls">
    <h3 id="city-title">Transit Isochrone</h3>
    <div class="control-group">
      <label>Mode</label>
      <select id="mode">
        <option value="single">Single Departure Time</option>
        <option value="sampled">Hour-Window Average</option>
      </select>
    </div>
    <div class="control-group">
      <label>Date</label>
      <input type="date" id="date-picker" />
    </div>
    <div class="control-group">
      <label>Departure Time: <span id="time-display">08:00</span></label>
      <input type="range" id="time-slider" min="0" max="86400" value="28800" step="300" />
    </div>
    <div class="control-group" id="samples-group" style="display:none">
      <label>Samples: <span id="samples-display">10</span></label>
      <input type="range" id="samples-slider" min="3" max="30" value="10" />
    </div>
    <div class="control-group">
      <label>Max travel time: <span id="maxtime-display">45 min</span></label>
      <input type="range" id="maxtime-slider" min="10" max="180" value="45" step="5" />
    </div>
    <div class="control-group">
      <label>Transfer slack: <span id="slack-display">1:00</span></label>
      <input type="range" id="slack-slider" min="0" max="300" value="60" step="15" />
    </div>
    <div id="pattern-info"></div>
    <div id="status">Click on the map to set origin</div>
    <button id="change-city">Change city</button>
  </div>

  <div id="legend">
    <div id="legend-gradient"></div>
    <div id="legend-labels">
      <span>0 min</span><span id="legend-mid"></span><span id="legend-max"></span>
    </div>
  </div>

  <div id="hover-info">
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
